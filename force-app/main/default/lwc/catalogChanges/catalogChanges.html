<template>
    <lightning-card title="Catalog Changes" icon-name="standard:metrics">
        <div class="slds-p-horizontal_medium slds-p-bottom_small">
            <div class="slds-m-bottom_small slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                <div>
                    <span class="slds-text-title_caps slds-m-right_x-small">View</span>
                    <lightning-button
                        variant={pricingButtonVariant}
                        label="Pricing deltas"
                        class="slds-m-right_xx-small"
                        onclick={handleModePricing}
                    ></lightning-button>
                    <lightning-button
                        variant={exceptionsButtonVariant}
                        label="Exception deltas"
                        onclick={handleModeExceptions}
                    ></lightning-button>
                </div>
                <lightning-button
                    variant="neutral"
                    label="Copy for Jira"
                    title="Copies summary and tab-separated column headers + rows for pasting into Jira or Excel"
                    icon-name="utility:copy"
                    disabled={copySummaryDisabled}
                    onclick={handleCopyForJira}
                ></lightning-button>
            </div>
            <div class="slds-grid slds-gutters_x-small slds-wrap">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4">
                    <lightning-combobox
                        name="monthFrom"
                        label="From month"
                        value={monthFrom}
                        placeholder="Select month"
                        options={monthOptions}
                        onchange={handleMonthFrom}
                    ></lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4">
                    <lightning-combobox
                        name="monthTo"
                        label="To month"
                        value={monthTo}
                        placeholder="Select month"
                        options={monthOptions}
                        onchange={handleMonthTo}
                    ></lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4">
                    <lightning-combobox
                        name="csp"
                        label="CSP"
                        value={cspFilter}
                        placeholder="All"
                        options={cspOptions}
                        onchange={handleCspChange}
                    ></lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4">
                    <lightning-combobox
                        name="changeType"
                        label="Change type"
                        value={changeTypeFilter}
                        options={changeTypeOptions}
                        onchange={handleChangeType}
                    ></lightning-combobox>
                </div>
            </div>
            <template if:true={compareHint}>
                <p class="slds-text-color_weak slds-m-top_x-small slds-text-body_small">{compareHint}</p>
            </template>
            <template if:true={error}>
                <p class="slds-text-color_error slds-m-top_x-small">{errorMessage}</p>
            </template>
        </div>
        <div class="slds-border_top">
            <template if:true={isPricingMode}>
                <template if:true={showPricingEmpty}>
                    <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                        No pricing changes for the selected months and filters.
                    </div>
                </template>
                <template if:false={showPricingEmpty}>
                    <lightning-datatable
                        key-field="rowKey"
                        data={pricingRows}
                        columns={pricingColumns}
                        hide-checkbox-column
                        show-row-number-column
                        sorted-by={pricingSortedBy}
                        sorted-direction={pricingSortDirection}
                        onsort={handlePricingSort}
                    >
                    </lightning-datatable>
                </template>
            </template>
            <template if:false={isPricingMode}>
                <template if:true={showExceptionEmpty}>
                    <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                        No exception changes for the selected months and filters.
                    </div>
                </template>
                <template if:false={showExceptionEmpty}>
                    <lightning-datatable
                        key-field="rowKey"
                        data={exceptionRows}
                        columns={exceptionColumns}
                        hide-checkbox-column
                        show-row-number-column
                        sorted-by={exceptionSortedBy}
                        sorted-direction={exceptionSortDirection}
                        onsort={handleExceptionSort}
                    >
                    </lightning-datatable>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
