<template>
    <div class="cp-theme-bar">
        <span class="cp-theme-label">Theme</span>
        <lightning-button-group>
            <lightning-button-icon
                icon-name="utility:desktop"
                alternative-text="Match system"
                title="Match system"
                variant={systemButtonVariant}
                onclick={handleThemeSystem}
            ></lightning-button-icon>
            <lightning-button-icon
                icon-name="utility:light_bulb"
                alternative-text="Light"
                title="Light"
                variant={lightButtonVariant}
                onclick={handleThemeLight}
            ></lightning-button-icon>
            <lightning-button-icon
                icon-name="utility:world"
                alternative-text="Dark"
                title="Dark"
                variant={darkButtonVariant}
                onclick={handleThemeDark}
            ></lightning-button-icon>
        </lightning-button-group>
    </div>
</template>
