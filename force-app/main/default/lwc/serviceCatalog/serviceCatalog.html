<template>
    <lightning-card title="Services Catalog" icon-name="custom:custom18">
        <div class="slds-p-horizontal_medium slds-p-bottom_small">
            <p class="slds-text-body_small slds-m-bottom_small">
                Cloud Prism — FOCUS-style category and subcategory comparison across CSPs. Each cell lists the
                <strong>three most popular</strong> services (by popularity score); use
                <strong>+N more</strong> to reveal the rest.
            </p>
            <div class="slds-grid slds-gutters_x-small slds-wrap slds-m-bottom_small">
                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                    <lightning-input
                        type="search"
                        label="Search"
                        value={searchKey}
                        placeholder="Service, description, category…"
                        onchange={handleSearchChange}
                    ></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                    <lightning-dual-listbox
                        name="categories"
                        label="Categories"
                        source-label="Available"
                        selected-label="Selected"
                        field-level-help="Leave empty to include all categories."
                        options={categoryOptions}
                        value={selectedCategoryValues}
                        onchange={handleCategoryFilterChange}
                    ></lightning-dual-listbox>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                    <lightning-dual-listbox
                        name="impacts"
                        label="Impact levels"
                        source-label="Available"
                        selected-label="Selected"
                        field-level-help="Leave empty to allow any impact level."
                        options={impactOptions}
                        value={selectedImpactValues}
                        onchange={handleImpactFilterChange}
                    ></lightning-dual-listbox>
                </div>
                <div class="slds-col slds-size_1-of-1">
                    <span class="slds-text-body_small slds-m-right_small">CSP columns</span>
                    <template for:each={cspButtonRow} for:item="c">
                        <lightning-button
                            key={c.key}
                            data-csp={c.key}
                            label={c.label}
                            variant={c.variant}
                            class="slds-m-right_xx-small slds-m-bottom_xx-small"
                            onclick={handleCspToggle}
                        ></lightning-button>
                    </template>
                </div>
            </div>
            <template if:true={error}>
                <p class="slds-text-color_error">Unable to load catalog.</p>
            </template>
        </div>

        <template if:false={hasRows}>
            <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">No catalog data.</div>
        </template>

        <template if:true={showEmptyFiltered}>
            <div class="slds-p-around_medium slds-text-align_center">No rows match your filters.</div>
        </template>

        <template if:true={hasRows}>
            <template if:false={showEmptyFiltered}>
                <div class="svc-scroll slds-border_top">
                    <template for:each={catalogSections} for:item="section">
                        <section key={section.name} class="svc-cat-block">
                            <button
                                type="button"
                                class="svc-cat-header slds-button slds-button_neutral slds-button_stretch"
                                data-cat={section.name}
                                onclick={toggleCategory}
                            >
                                <span class="svc-cat-chevron slds-m-right_x-small">{section.chevron}</span>
                                <span class="svc-cat-title">{section.name}</span>
                            </button>
                            <template if:true={section.expanded}>
                                <div class="svc-table-wrap">
                                    <table class="svc-table slds-table slds-table_bordered slds-table_cell-buffer">
                                        <thead>
                                            <tr>
                                                <th scope="col">Subcategory</th>
                                                <th scope="col">Description</th>
                                                <th scope="col" class="svc-th-aws">AWS</th>
                                                <th scope="col" class="svc-th-azure">Azure</th>
                                                <th scope="col" class="svc-th-gcp">GCP</th>
                                                <th scope="col" class="svc-th-oracle">Oracle</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={section.groups} for:item="grp">
                                                <tr key={grp.groupKey}>
                                                    <td>{grp.subcategory}</td>
                                                    <td>
                                                        <div class="svc-desc">{grp.description}</div>
                                                    </td>
                                                    <template for:each={grp.cellColumns} for:item="col">
                                                        <td key={col.csp} class="svc-cell">
                                                            <div class="svc-offers">
                                                                <template for:each={col.top} for:item="row">
                                                                    <div key={row.rowKey} class="svc-offer">
                                                                        <div class="svc-name">{row.serviceName}</div>
                                                                        <div class="svc-ils">
                                                                            <template iterator:it={row.impactList}>
                                                                                <span key={it.value} class="svc-il-pill">{it.value}</span>
                                                                            </template>
                                                                        </div>
                                                                    </div>
                                                                </template>
                                                                <template if:true={col.hasMore}>
                                                                    <template if:true={col.expanded}>
                                                                        <template for:each={col.rest} for:item="row">
                                                                            <div key={row.rowKey} class="svc-offer svc-offer-rest">
                                                                                <div class="svc-name">{row.serviceName}</div>
                                                                                <div class="svc-ils">
                                                                                    <template iterator:it={row.impactList}>
                                                                                        <span key={it.value} class="svc-il-pill">{it.value}</span>
                                                                                    </template>
                                                                                </div>
                                                                            </div>
                                                                        </template>
                                                                    </template>
                                                                    <lightning-button
                                                                        variant="base"
                                                                        label={col.expandButtonLabel}
                                                                        data-key={col.cellKey}
                                                                        class="svc-more-btn"
                                                                        onclick={toggleCellExpand}
                                                                    ></lightning-button>
                                                                </template>
                                                            </div>
                                                        </td>
                                                    </template>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                        </section>
                    </template>
                </div>
            </template>
        </template>
    </lightning-card>
</template>
