                />
            </symbol>
        </svg>

        <div class="poc-banner">
            ⚠ <strong>Proof of Concept</strong> — Data is for demonstration only. Categories aligned to
            <a href="https://focus.finops.org/focus-specification/v1-3/#servicecategory" target="_blank" rel="noopener"
                >FOCUS 1.3</a
            >. Verify against official CSP documentation.
        </div>

        <div class="svc-page-intro">
            <h2 class="svc-page-title">Cloud service offerings comparison</h2>
            <p class="svc-page-sub">
                <strong>Category</strong> is the FinOps FOCUS 1.3 service category (from <code>Category__c</code>).
                <strong>Subcategory</strong> is a contract comparison bucket (e.g. Containers, Virtual Machines) from
                <code>Subcategory__c</code>. One row per category + subcategory; CSP columns list matching offerings and
                impact levels.
                <strong>Description</strong> uses the first non-empty description in each group when catalog lines align.
            </p>
        </div>

        <div class="toolbar">
            <div class="toolbar-inner">
                <div class="search-wrap">
                    <span class="search-icon" aria-hidden="true">🔍</span>
                    <input
                        type="text"
                        class="sc-search-input"
                        placeholder="Search services, categories…"
                        value={searchKey}
                        oninput={handleSearchInput}
                    />
                </div>

                <div class="ms-wrap">
                    <button type="button" class={msCatBtnClass} data-which="cat" onclick={toggleMs}>
                        <span>{msCatLabel}</span>
                        <span class="ms-arrow">▾</span>
                    </button>
                    <div class={msCatDropClass}>
                        <div class="ms-clear" data-type="cat" onclick={clearMs}>Clear all</div>
                        <div class="ms-sep"></div>
                        <template for:each={catOptions} for:item="opt">
                            <div
                                key={opt.key}
                                class={opt.optionClass}
                                data-type="cat"
                                data-val={opt.val}
                                onclick={toggleMsOpt}
                            >
                                <span class="ms-check"></span>
                                <span>{opt.val}</span>
                            </div>
                        </template>
                    </div>
                </div>

                <span class="svc-toolbar-hint">Filter by impact level</span>
                <div class="ms-wrap">
                    <button type="button" class={msIlBtnClass} data-which="il" onclick={toggleMs}>
                        <span>{msIlLabel}</span>
                        <span class="ms-arrow">▾</span>
                    </button>
                    <div class={msIlDropClass}>
                        <div class="ms-clear" data-type="il" onclick={clearMs}>Clear all</div>
                        <div class="ms-sep"></div>
                        <template for:each={ilOptions} for:item="opt">
                            <div
                                key={opt.key}
                                class={opt.optionClass}
                                data-type="il"
                                data-val={opt.val}
                                onclick={toggleMsOpt}
                            >
                                <span class="ms-check"></span>
                                <span class={opt.dotClass}></span>
                                <span>{opt.val}</span>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="ms-wrap">
                    <button type="button" class={msCspBtnClass} data-which="csp" onclick={toggleMs}>
                        <span>{msCspLabel}</span>
                        <span class="ms-arrow">▾</span>
                    </button>
                    <div class={msCspDropClass}>
                        <div class="ms-clear" data-type="csp" onclick={clearMs}>Clear all</div>
                        <div class="ms-sep"></div>
                        <template for:each={cspOptions} for:item="opt">
                            <div
                                key={opt.key}
                                class={opt.optionClass}
                                data-type="csp"
                                data-val={opt.val}
                                onclick={toggleMsOpt}
                            >
                                <span class="ms-check"></span>
                                <svg class="csp-ms-ico" width="13" height="13" aria-hidden="true">
                                    <use href={opt.href}></use>
                                </svg>
                                <span>{opt.label}</span>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="toolbar-sep"></div>

                <div class="il-legend" aria-hidden="true">
                    <span class="legend-key">Key</span>
                    <span class="il-chip"><span class="il-dot il-dot-il2"></span>IL2</span>
                    <span class="il-chip"><span class="il-dot il-dot-il3"></span>IL3</span>
                    <span class="il-chip"><span class="il-dot il-dot-il4"></span>IL4</span>
                    <span class="il-chip"><span class="il-dot il-dot-il5"></span>IL5</span>
                    <span class="il-chip"><span class="il-dot il-dot-il6"></span>IL6</span>
                    <span class="legend-detail">IL5 highlight · newly authorized</span>
                    <span class="new-chip">✦ New service (30d)</span>
                </div>

                <div class="toolbar-theme">
                    <button type="button" class="theme-toggle" onclick={toggleTheme} aria-pressed={themePressedAria}>
                        <span class="tog-label">{themeToggleLabel}</span>
                    </button>
                    <span class="focus-pill"
                        >FOCUS 1.3 ·
                        <a href="https://focus.finops.org/focus-specification/v1-3/" target="_blank" rel="noopener"
                            >spec ↗</a
                        ></span
                    >
                </div>
            </div>
        </div>

        <template if:true={loading}>
            <div class="sc-loading">Loading catalog…</div>
        </template>

        <template if:true={hasError}>
            <div class="sc-error" role="alert">{errorMessage}</div>
        </template>

        <template if:true={isEmpty}>
            <div class="empty-state">
                <div class="es-icon">◻</div>
                <p>No service catalog rows yet. Import data into <strong>Service_Catalog__c</strong>.</p>
            </div>
        </template>

        <template if:true={isFilterEmpty}>
            <div class="empty-state filter-empty">
                <div class="es-icon">⌕</div>
                <p>No comparison rows match your search or filters.</p>
                <button type="button" class="btn-show-more" onclick={clearAllFilters}>Clear search and filters</button>
            </div>
        </template>

        <template if:false={loading}>
            <template if:false={hasError}>
                <template if:false={isEmpty}>
                    <template if:false={isFilterEmpty}>
                    <div class="table-wrap">
                        <div class="result-meta">
                            Showing
                            <strong>{metaFilteredCount}</strong> comparison rows in
                            <strong>{metaCategoryCount}</strong> FOCUS categories ({metaTotalGroups} total groups)
                        </div>

                        <table class="sc-table" id="svcTable">
                            <thead>
                                <tr>
                                    <th class={thCategorySortClass} onclick={handleSortCategory}>
                                        Category<span class="si">{sortIndicatorCategory}</span>
                                    </th>
                                    <th class={thSubcategorySortClass} onclick={handleSortSubcategory}>
                                        Subcategory<span class="si">{sortIndicatorSubcategory}</span>
                                    </th>
                                    <th>Description</th>
                                    <th class="th-aws">
                                        <div class="csp-hdr">
                                            <svg width="16" height="16" aria-hidden="true">
                                                <use href="#logo-aws"></use>
                                            </svg>
                                            AWS
                                        </div>
                                    </th>
                                    <th class="th-azure">
                                        <div class="csp-hdr">
                                            <svg width="16" height="16" aria-hidden="true">
                                                <use href="#logo-azure"></use>
                                            </svg>
                                            Azure
                                        </div>
                                    </th>
                                    <th class="th-gcp">
                                        <div class="csp-hdr">
                                            <svg width="16" height="16" aria-hidden="true">
                                                <use href="#logo-gcp"></use>
                                            </svg>
                                            GCP
                                        </div>
                                    </th>
                                    <th class="th-oracle">
                                        <div class="csp-hdr">
                                            <svg width="16" height="16" aria-hidden="true">
                                                <use href="#logo-oracle"></use>
                                            </svg>
                                            Oracle
                                        </div>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={svcUnifiedRows} for:item="u">
                                    <tr key={u.key} class={u.trClass}>
                                        <template if:true={u.isBand}>
                                            <td colspan="7">
                                                <div class="svc-cat-band-inner">
                                                    <span class="cat-band-title">{u.categoryName}</span>
                                                    <span class="cat-band-meta">{u.rowCountLabel}</span>
                                                </div>
                                            </td>
                                        </template>
                                        <template if:true={u.isData}>
                                            <td class="td-cat">{u.category}</td>
                                            <td class="td-sub">{u.subcategoryLabel}</td>
                                            <td class="td-desc">{u.description}</td>
                                            <td class="svc-cell td-aws-c">
                                                <template if:true={u.awsEntries.length}>
                                                    <template for:each={u.awsEntries} for:item="ent">
                                                        <div class="se" key={ent.serviceName}>
                                                            <div class="sn">{ent.serviceName}</div>
                                                            <div class="sm">
                                                                <template for:each={ent.badges} for:item="bd">
                                                                    <span key={bd.label} class={bd.cssClass}>{bd.label}</span>
                                                                </template>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </template>
                                                <template if:false={u.awsEntries.length}>
                                                    <span class="none-ind">·</span>
                                                </template>
                                            </td>
                                            <td class="svc-cell td-azure-c">
                                                <template if:true={u.azureEntries.length}>
                                                    <template for:each={u.azureEntries} for:item="ent">
                                                        <div class="se" key={ent.serviceName}>
                                                            <div class="sn">{ent.serviceName}</div>
                                                            <div class="sm">
                                                                <template for:each={ent.badges} for:item="bd">
                                                                    <span key={bd.label} class={bd.cssClass}>{bd.label}</span>
                                                                </template>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </template>
                                                <template if:false={u.azureEntries.length}>
                                                    <span class="none-ind">·</span>
                                                </template>
                                            </td>
                                            <td class="svc-cell td-gcp-c">
                                                <template if:true={u.gcpEntries.length}>
                                                    <template for:each={u.gcpEntries} for:item="ent">
                                                        <div class="se" key={ent.serviceName}>
                                                            <div class="sn">{ent.serviceName}</div>
                                                            <div class="sm">
                                                                <template for:each={ent.badges} for:item="bd">
                                                                    <span key={bd.label} class={bd.cssClass}>{bd.label}</span>
                                                                </template>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </template>
                                                <template if:false={u.gcpEntries.length}>
                                                    <span class="none-ind">·</span>
                                                </template>
                                            </td>
                                            <td class="svc-cell td-oracle-c">
                                                <template if:true={u.oracleEntries.length}>
                                                    <template for:each={u.oracleEntries} for:item="ent">
                                                        <div class="se" key={ent.serviceName}>
                                                            <div class="sn">{ent.serviceName}</div>
                                                            <div class="sm">
                                                                <template for:each={ent.badges} for:item="bd">
                                                                    <span key={bd.label} class={bd.cssClass}>{bd.label}</span>
                                                                </template>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </template>
                                                <template if:false={u.oracleEntries.length}>
                                                    <span class="none-ind">·</span>
                                                </template>
                                            </td>
                                        </template>
                                        <template if:true={u.isShowMore}>
                                            <td colspan="7">
                                                <button
                                                    type="button"
                                                    class="btn-show-more"
                                                    data-category={u.categoryName}
                                                    onclick={toggleShowMore}
                                                >
                                                    Show {u.hiddenCount} more in this category
                                                </button>
                                            </td>
                                        </template>
                                        <template if:true={u.isShowLess}>
                                            <td colspan="7">
                                                <button
                                                    type="button"
                                                    class="btn-show-more"
                                                    data-category={u.categoryName}
                                                    onclick={toggleShowMore}
                                                >
                                                    Show less
                                                </button>
                                            </td>
                                        </template>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                    </template>
                </template>
            </template>
        </template>

        <footer class="sc-page-footer">
            <div class="footer-inner">
                <span
                    >Service data based on public documentation. Categories aligned to
                    <a href="https://focus.finops.org/focus-specification/v1-3/#servicecategory" target="_blank" rel="noopener"
                        >FOCUS 1.3</a
                    >.</span
                >
                <span>Last updated: <strong>{footerYearLabel}</strong></span>
            </div>
        </footer>
    </div>
</template>
